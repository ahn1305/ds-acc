<!DOCTYPE html>
<html>
<head>
<title>DSX → DBT Platform</title>

<style>
body {
    background:linear-gradient(135deg,#0f172a,#020617);
    color:#e2e8f0;
    font-family:Inter, sans-serif;
    margin:0;
}

.container {
    width:95%;
    margin:auto;
    padding:20px;
}

h2 { color:#38bdf8; }

.card {
    background:rgba(30,41,59,0.8);
    padding:20px;
    margin-top:20px;
    border-radius:14px;
}

.status {
    padding:5px 12px;
    border-radius:20px;
    font-size:12px;
}

.processing { background:#f59e0b; }
.done { background:#22c55e; }
.failed { background:#ef4444; }

.progress {
    height:6px;
    background:#334155;
    margin-top:10px;
    border-radius:10px;
}

.progress-inner {
    height:100%;
    background:linear-gradient(90deg,#38bdf8,#6366f1);
}

.tabs { margin-top:15px; }

.tab-btn {
    padding:6px 12px;
    margin-right:5px;
    cursor:pointer;
    background:#334155;
    border-radius:6px;
}

.tab-btn.active {
    background:#38bdf8;
    color:black;
}

.tab-content {
    display:none;
    margin-top:10px;
}

.tab-content.active {
    display:block;
}

pre {
    background:#020617;
    padding:12px;
    border-radius:8px;
    overflow-x:auto;
}

/* STTM */
tr.incomplete-row { background: rgba(239, 68, 68, 0.15); }
tr.complete-row { background: rgba(34, 197, 94, 0.08); }

.incomplete { color:#ef4444; font-weight:bold; }
.complete { color:#22c55e; }

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td, th {
    border:1px solid #334155;
    padding:6px;
}

/* DBT TREE */
ul {
    list-style-type:none;
    padding-left:20px;
}

.dbt-file {
    margin:5px 0;
}

button {
    background:#38bdf8;
    border:none;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
    margin-left:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 DSX → DBT Platform</h2>

<form id="uploadForm">
    <input type="file" multiple required />
    <button>Upload</button>
</form>

<div id="dashboard"></div>

</div>

<script>

let socket, batchId, files = {};

function connectWS(batchId) {
    let protocol = location.protocol === "https:" ? "wss" : "ws";
    socket = new WebSocket(`${protocol}://${location.host}/ws/batch/${batchId}/`);
    socket.onmessage = e => handleUpdate(JSON.parse(e.data));
}

function handleUpdate(data) {

    if (!data.file_id) return;

    let id = data.file_id;

    if (!files[id]) {
        files[id] = {
            name: data.file_name || `File ${id}`,
            progress: 0,
            content: {}
        };
    }

    let f = files[id];

    if (data.step === "DONE") {
        f.progress = 100;
    } else if (data.step) {
        f.progress += 15;
    }

    Object.assign(f.content, data);

    render();
}

function render() {

    let html = "";

    Object.entries(files).forEach(([id,f]) => {

        html += `
        <div class="card">

            <h3>${f.name}</h3>

            <span class="status ${f.content.status === "DONE" ? "done" :
                                  f.content.status === "FAILED" ? "failed" : "processing"}">
                ${f.content.status || "Processing"}
            </span>

            <div class="progress">
                <div class="progress-inner" style="width:${f.progress}%"></div>
            </div>

            ${renderTabs(id,f)}

        </div>
        `;
    });

    document.getElementById("dashboard").innerHTML = html;
}

function renderTabs(id,f) {

    return `
    <div class="tabs">

        <div>
            <span class="tab-btn active" onclick="openTab(event,'sttm_${id}')">STTM</span>
            <span class="tab-btn" onclick="openTab(event,'sql_${id}')">SQL</span>
            <span class="tab-btn" onclick="openTab(event,'doc_${id}')">Docs</span>
            <span class="tab-btn" onclick="openTab(event,'dbt_${id}')">DBT</span>
        </div>

        <div id="sttm_${id}" class="tab-content active">
            ${renderSTTM(f.content)}
        </div>

        <div id="sql_${id}" class="tab-content">
            ${renderSQL(f.content)}
        </div>

        <div id="doc_${id}" class="tab-content">
            ${renderDocs(f.content)}
        </div>

        <div id="dbt_${id}" class="tab-content">
            ${renderDBTTree(f.content.dbt_files)}
        </div>

    </div>
    `;
}

function openTab(evt, id) {
    let parent = evt.target.closest(".card");

    parent.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    parent.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

    parent.querySelector("#" + id).classList.add("active");
    evt.target.classList.add("active");
}

/* ================= STTM ================= */
function renderSTTM(c) {

    if (!c.sttm || !c.sttm.length) return "<p>No STTM</p>";

    const headers = ["source","target","transformation","stage","type","confidence","incomplete"];

    let html = "<table><tr>" + headers.map(x=>`<th>${x.toUpperCase()}</th>`).join("") + "</tr>";

    c.sttm.forEach(r => {

        html += `<tr class="${r.incomplete ? 'incomplete-row' : 'complete-row'}">`;

        headers.forEach(h => {

            let val = r[h] ?? "";

            if (h === "transformation") {
                html += `<td class="${r.incomplete ? 'incomplete':'complete'}">${val}</td>`;
            }

            else if (h === "incomplete") {
                html += `<td>${r.incomplete ? "❌ Yes" : "✅ No"}</td>`;
            }

            else {
                html += `<td>${val}</td>`;
            }

        });

        html += "</tr>";
    });

    return html + "</table>";
}

/* ================= SQL ================= */
function renderSQL(c) {
    if (!c.snowflake_sql) return "<p>No SQL generated</p>";
    return `<pre>${c.snowflake_sql}</pre>`;
}

/* ================= DOC ================= */
function renderDocs(c) {
    if (!c.documentation) return "<p>No Documentation</p>";
    return `<pre>${c.documentation}</pre>`;
}

/* ================= DBT TREE ================= */
function renderDBTTree(dbtFiles) {

    if (!dbtFiles || Object.keys(dbtFiles).length === 0) {
        return "<p>No DBT files</p>";
    }

    let tree = {};

    Object.keys(dbtFiles).forEach(path => {
        let parts = path.split('/');
        let node = tree;

        parts.forEach((p,i)=>{
            if (!node[p]) node[p] = (i === parts.length-1 ? dbtFiles[path] : {});
            node = node[p];
        });
    });

    function renderNode(node, path="") {
        let html = "<ul>";

        for (let key in node) {

            if (typeof node[key] === "string") {
                html += `
                <li class="dbt-file">
                    📄 ${key}
                    <button onclick="downloadFile('${path+key}', \`${node[key].replace(/`/g,"\\`")}\`)">
                        Download
                    </button>
                </li>`;
            } else {
                html += `<li>📁 ${key}${renderNode(node[key], path+key+"/")}</li>`;
            }
        }

        return html + "</ul>";
    }

    return renderNode(tree);
}

function downloadFile(filename, content) {
    let blob = new Blob([content], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename.split("/").pop();
    a.click();
}

/* ================= UPLOAD ================= */
document.getElementById("uploadForm").onsubmit = async e => {

    e.preventDefault();

    let fd = new FormData();
    let filesInput = document.querySelector("input").files;

    for (let f of filesInput) fd.append("files", f);

    let res = await fetch("/upload/", { method:"POST", body:fd });
    let data = await res.json();

    batchId = data.batch_id;

    document.getElementById("dashboard").innerHTML = "Processing...";

    connectWS(batchId);
};

</script>

</body>
</html>
